<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TI Simulation Console | Talent Intelligence Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ti-blue: #0ea5e9; --ti-dark: #030712; --ti-surface: #0f172a; }
        body { 
            background-color: var(--ti-dark); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            overscroll-behavior-y: contain;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bg-grid { 
            background-image: radial-gradient(rgba(14, 165, 233, 0.1) 1px, transparent 0); 
            background-size: 30px 30px; 
        }
        .scanline { 
            width: 100%; height: 100px; z-index: 100; 
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(14, 165, 233, 0.02) 50%, rgba(0, 0, 0, 0) 100%); 
            opacity: 0.1; position: fixed; bottom: 100%; 
            animation: scanline 8s linear infinite; pointer-events: none; 
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }
        .crt-flicker { animation: flicker 0.15s infinite; opacity: 0.98; }
        @keyframes flicker { 0% { opacity: 0.985; } 50% { opacity: 0.995; } 100% { opacity: 0.985; } }
        
        /* Custom Scrollbar for desktop */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // PRESERVING YOUR KEYS
        window.__firebase_config = JSON.stringify({
            apiKey: "AIzaSyBcZqVfDMIsoEaBtfhah8CYMBhDfpa2qRo",
            authDomain: "ti-training-toby.firebaseapp.com",
            projectId: "ti-training-toby",
            storageBucket: "ti-training-toby.firebasestorage.app",
            messagingSenderId: "505114823195",
            appId: "1:505114823195:web:5a704fa69c9c652b8d86be"
        });
        window.__app_id = "ti-simulation-v1";
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const config = JSON.parse(window.__firebase_config);
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { auth, db, doc, setDoc, getDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const apiKey = "";

        const SCENARIOS = [
            {
                id: "s8", title: "THE MANDATE", subtitle: "Defining Talent Intelligence",
                difficulty: "LEVEL 1 · ANALYST", accent: "#4ade80", xpReward: 120,
                brief: "Define your function for the CHRO before others scope it for you.",
                nodes: {
                    start: {
                        scene: "Sarah Chen (CHRO): 'Before I take this to the exec team, I need to be able to explain what Talent Intelligence is. In plain English—what are you building here?'",
                        choices: [
                            { text: "Lead with market data: 'Application of external labor data to drive business decisions.'", next: "practitioner_def", xp: 20, tag: "BEST PRACTICE" },
                            { text: "Lead with unified data: 'Combination of internal people data and external market intelligence.'", next: "unified_def", xp: 30, tag: "STRATEGIC" }
                        ]
                    },
                    practitioner_def: {
                        scene: "Sarah: 'Is it just market research? How does it differ from the AI platform the CPO just bought?'",
                        choices: [{ text: "Clarify: 'The platform is a tool; TI is the function providing analytical context.'", next: "final", xp: 30, tag: "BEST PRACTICE" }]
                    },
                    unified_def: {
                        scene: "Sarah: 'Lands well. What's the first tangible deliverable to prove value?'",
                        choices: [{ text: "A decision-ready market brief on a core hiring gap.", next: "final", xp: 30, tag: "BEST PRACTICE" }]
                    },
                    final: { scene: "Success. You've established the mandate.", isEnd: true }
                }
            },
            {
                id: "s1", title: "THE TALENT GAP", subtitle: "Data Foundation Challenge",
                difficulty: "LEVEL 3 · ANALYST", accent: "#38bdf8", xpReward: 150,
                brief: "Explain why engineering hiring is stalling to the CHRO in 15 minutes.",
                nodes: {
                    start: {
                        scene: "CHRO: 'Why are we struggling to hire senior backend engineers? Need to share this in the offsite now.'",
                        choices: [
                            { text: "Clarify: 'Are salaries competitive, or are we losing candidates post-offer?'", next: "scoped", xp: 20, tag: "BEST PRACTICE" },
                            { text: "Immediately pull LinkedIn and ATS data.", next: "data_rush", xp: 10, tag: "PARTIAL" }
                        ]
                    },
                    scoped: {
                        scene: "CHRO: 'Both. Check the data.' You have 60 minutes.",
                        choices: [{ text: "Use real-time benchmarking (Lightcast) + ATS decline reasons.", next: "final", xp: 30, tag: "BEST PRACTICE" }]
                    },
                    data_rush: { scene: "You have numbers, but no story. The CHRO asks for a recommendation.", choices: [{ text: "Pivot to comp benchmarking.", next: "final", xp: 10 }] },
                    final: { scene: "Analysis complete. You identified a 12% comp gap.", isEnd: true }
                }
            },
            { id: "s2", title: "THE BOARD DECK", subtitle: "Data Integrity", difficulty: "LEVEL 4 · SENIOR", accent: "#facc15", brief: "Quarterly board pack preparation. Conflict discovered 2 hours before submission.", nodes: { start: { scene: "CEO wants inflated numbers. CFO expects accuracy. You found a discrepancy in Cost-per-Hire.", choices: [{ text: "Flag discrepancy and use the correct figure.", next: "final", xp: 40, tag: "INTEGRITY" }, { text: "Use the inflated number as requested.", next: "final", xp: 0, tag: "RISK" }] }, final: { scene: "Submission complete.", isEnd: true } } },
            { id: "s3", title: "THE COMPETITIVE STORM", subtitle: "Crisis Intelligence", difficulty: "LEVEL 5 · LEAD", accent: "#f97316", brief: "Competitor announces a 500-person hiring surge. Crisis response required.", nodes: { start: { scene: "CEO asks: 'What does this mean for us?' You have 30 minutes to triage.", choices: [{ text: "Triage by Known vs. Unknown vs. Assumptions.", next: "final", xp: 35, tag: "BEST PRACTICE" }] }, final: { scene: "Strategic response delivered.", isEnd: true } } },
            { id: "s4", title: "THE FIVE-YEAR PLAN", subtitle: "Strategic Planning", difficulty: "LEVEL 4 · SENIOR", accent: "#38bdf8", brief: "Model future capability needs for a 5-year business transformation.", nodes: { start: { scene: "Transformation brief: shift from product to platform. How do you start?", choices: [{ text: "Map the capability delta first.", next: "final", xp: 35, tag: "STRATEGY" }] }, final: { scene: "Roadmap approved.", isEnd: true } } },
            { id: "s5", title: "THE ETHICS LINE", subtitle: "DEI Analytics", difficulty: "LEVEL 5 · LEAD", accent: "#e879f9", brief: "Diversity analytics reveal screening bias. Stakeholders want to bury the findings.", nodes: { start: { scene: "Findings: 2.3x screening bias for diverse candidates. Legal is nervous.", choices: [{ text: "Maintain transparency with a structured improvement plan.", next: "final", xp: 40, tag: "ETHICS" }] }, final: { scene: "Ethics line held.", isEnd: true } } },
            { id: "s6", title: "THE AI RECKONING", subtitle: "Automation ROI", difficulty: "LEVEL 6 · DIRECTOR", accent: "#a78bfa", brief: "CPO wants to automate 30% of TA. Vendor claims don't match your pilot data.", nodes: { start: { scene: "CPO: 'Build the case for £2M savings via AI.' Your data shows £600k.", choices: [{ text: "Present the validated range honestly.", next: "final", xp: 40, tag: "INTEGRITY" }] }, final: { scene: "AI strategy recalibrated.", isEnd: true } } },
            { id: "s7", title: "BATTLECARD BRIEF", subtitle: "Competitive Intel", difficulty: "LEVEL 3 · SENIOR", accent: "#22d3ee", brief: "Create battlecards for recruiters losing candidates to competitors.", nodes: { start: { scene: "Head of TA: 'We need battlecards for TechCorp, ScaleUp, and FinTechCo.'", choices: [{ text: "Structure cards around recruiter decision moments.", next: "final", xp: 30, tag: "ENABLEMENT" }] }, final: { scene: "Battlecards deployed.", isEnd: true } } },
            { id: "s10", title: "PURPLE SQUIRREL", subtitle: "Impossible Brief", difficulty: "LEVEL 0 · SOURCER", accent: "#4ade80", brief: "Hiring manager Dan wants 15 ML engineers in Manchester at £65k. Market says no.", nodes: { start: { scene: "Brief received. Data check shows 31 active engineers at £97k median.", choices: [{ text: "Present the market brief to Dan before sourcing.", next: "final", xp: 30, tag: "BEST PRACTICE" }] }, final: { scene: "Brief recalibrated.", isEnd: true } } },
            { id: "s11", title: "FIRST 90 DAYS", subtitle: "Function Setup", difficulty: "LEVEL 0 · ANALYST", accent: "#4ade80", brief: "Day 31. Leadership wants to see your value findings. You have partial data access.", nodes: { start: { scene: "Priya: 'Show them what TI can do.' Where do you start?", choices: [{ text: "Discovery calls with 5 key stakeholders first.", next: "final", xp: 28, tag: "STRATEGIC" }] }, final: { scene: "90-day review successful.", isEnd: true } } },
            { id: "s12", title: "CONVERSATION AFTER", subtitle: "Defending Data", difficulty: "LEVEL 2 · SENIOR", accent: "#facc15", brief: "VP Engineering rejects your 24% comp gap data because it's 'uncomfortable'.", nodes: { start: { scene: "Marcus: 'I don't think we're 24% off. Methodology concerns.'", choices: [{ text: "Walk through methodology as transparency, not defense.", next: "final", xp: 28, tag: "INFLUENCE" }] }, final: { scene: "Marcus aligned on the gap.", isEnd: true } } },
            { id: "s13", title: "STAKEHOLDER FLIP", subtitle: "Hiring Manager Lens", difficulty: "LEVEL 1 · ANALYST", accent: "#4ade80", brief: "Switch perspective. You are the Hiring Manager. TI says your budget is 18% low.", nodes: { start: { scene: "You've had recent success on current budget. TI says market has shifted.", choices: [{ text: "Engage TI with curiosity to understand the gap.", next: "final", xp: 30, tag: "PARTNERSHIP" }] }, final: { scene: "Budget and strategy updated.", isEnd: true } } }
        ];

        // API UTILS
        const callGemini = async (prompt) => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "You are a Senior TI Mentor. Sharp, concise critique (max 2 sentences)." }] } })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return "Recalibrating analyzer..."; }
        };

        const playTTS = async (text) => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }, model: "gemini-2.5-flash-preview-tts" })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const pcmBuffer = Uint8Array.from(atob(pcmData), c => c.charCodeAt(0)).buffer;
                const wavHeader = new ArrayBuffer(44);
                const view = new DataView(wavHeader);
                const writeString = (o, s) => { for (let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
                writeString(0, 'RIFF'); view.setUint32(4, 32 + pcmBuffer.byteLength, true); writeString(8, 'WAVE');
                writeString(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true); view.setUint32(28, 48000, true); view.setUint16(32, 2, true);
                view.setUint16(34, 16, true); writeString(36, 'data'); view.setUint32(40, pcmBuffer.byteLength, true);
                const audio = new Audio(URL.createObjectURL(new Blob([wavHeader, pcmBuffer], { type: 'audio/wav' })));
                audio.play();
            } catch (e) {}
        };

        // UI ROOT
        const App = () => {
            const [view, setView] = useState('welcome');
            const [user, setUser] = useState(null);
            const [gameState, setGameState] = useState({ xp: 0, completed: {} });
            const [currentSim, setCurrentSim] = useState(null);
            const [currentNode, setCurrentNode] = useState('start');
            const [history, setHistory] = useState([]);
            const [aiFeedback, setAiFeedback] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);

            useEffect(() => {
                const { auth, onAuthStateChanged, signInAnonymously } = window.fb;
                onAuthStateChanged(auth, async (u) => {
                    if (u) { setUser(u); loadProfile(u.uid); }
                    else { await signInAnonymously(auth); }
                });
            }, []);

            const loadProfile = async (uid) => {
                const snap = await window.fb.getDoc(window.fb.doc(window.fb.db, 'artifacts', window.__app_id, 'users', uid, 'profile'));
                if (snap.exists()) setGameState(snap.data());
            };

            const startSim = (sim) => {
                setCurrentSim(sim); setCurrentNode('start'); setHistory([]); setAiFeedback(""); setView('playing');
                playTTS(sim.nodes.start.scene);
            };

            const handleDecision = async (choice) => {
                setIsGenerating(true);
                const feedback = await callGemini(`Scenario: ${currentSim.title}. Context: ${currentSim.nodes[currentNode].scene}. Choice: ${choice.text}.`);
                setAiFeedback(feedback); setIsGenerating(false);
                setHistory([...history, { choice: choice.text, tag: choice.tag }]);
                
                if (currentSim.nodes[choice.next]?.isEnd) {
                    const newXp = gameState.xp + (choice.xp || 30);
                    const newComp = { ...gameState.completed, [currentSim.id]: true };
                    setGameState({ xp: newXp, completed: newComp });
                    window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.__app_id, 'users', user.uid, 'profile'), { xp: newXp, completed: newComp });
                    setView('summary');
                } else {
                    setCurrentNode(choice.next);
                    playTTS(currentSim.nodes[choice.next].scene);
                }
            };

            const getRank = (xp) => {
                if (xp < 500) return "LEVEL_0 · APPRENTICE";
                if (xp < 1500) return "LEVEL_1 · ANALYST";
                return "LEVEL_2 · ADVISOR";
            };

            useEffect(() => { lucide.createIcons(); }, [view, currentNode, isGenerating]);

            const NavItem = ({ id, icon }) => (
                <button 
                    onClick={() => setView(id)} 
                    className={`flex-1 flex flex-col items-center justify-center gap-1 transition-all ${view === id ? 'text-sky-400' : 'text-white/20'}`}
                >
                    <i data-lucide={icon} className="w-5 h-5"></i>
                    <span className="text-[8px] mono font-bold uppercase">{id}</span>
                </button>
            );

            return (
                <div className="flex flex-col min-h-screen bg-grid">
                    <div className="scanline"></div>
                    
                    {/* Header: Responsive Scaling */}
                    <header className="h-16 md:h-20 border-b border-white/5 flex items-center justify-between px-4 md:px-8 glass fixed top-0 w-full z-50">
                        <div className="flex items-center gap-2 md:gap-3">
                            <div className="w-7 h-7 md:w-8 md:h-8 bg-sky-500/20 rounded-sm flex items-center justify-center border border-sky-500/30">
                                <i data-lucide="shield" className="w-4 h-4 text-sky-400"></i>
                            </div>
                            <h1 className="text-[10px] md:text-xs font-bold tracking-widest text-white/90 mono">TI_CONSOLE_V4</h1>
                        </div>
                        <div className="text-right">
                            <p className="text-[8px] md:text-[10px] text-sky-400 mono">{getRank(gameState.xp)}</p>
                            <p className="text-sm md:text-lg font-bold mono leading-none">{gameState.xp.toLocaleString()} XP</p>
                        </div>
                    </header>

                    {/* Sidebar / Bottom Nav Wrapper */}
                    <div className="flex flex-col md:flex-row flex-1 pt-16 md:pt-20 pb-20 md:pb-0">
                        
                        {/* Desktop Sidebar */}
                        <aside className="hidden md:flex w-20 border-r border-white/5 flex-col items-center py-8 gap-8 glass sticky top-20 h-[calc(100vh-80px)]">
                            <NavItem id="dashboard" icon="layout-grid" />
                            <NavItem id="map" icon="map" />
                            <NavItem id="rank" icon="award" />
                        </aside>

                        {/* Mobile Bottom Nav */}
                        <nav className="md:hidden fixed bottom-0 w-full h-16 glass border-t border-white/5 flex z-50 safe-bottom">
                            <NavItem id="dashboard" icon="layout-grid" />
                            <NavItem id="map" icon="map" />
                            <NavItem id="rank" icon="award" />
                        </nav>

                        {/* Main Body */}
                        <main className="flex-1 p-4 md:p-8 overflow-y-auto">
                            
                            {view === 'welcome' && (
                                <div className="min-h-[70vh] flex flex-col items-center justify-center text-center px-4">
                                    <h2 className="text-4xl md:text-6xl font-light tracking-tighter mb-4">Talent <span className="text-sky-500 font-bold italic">Intelligence</span></h2>
                                    <p className="text-white/40 mb-8 mono text-[10px] md:text-xs uppercase">Decision Quality Benchmark Engine</p>
                                    <button onClick={() => setView('dashboard')} className="w-full md:w-auto px-12 py-4 bg-sky-500 text-white font-bold mono text-sm rounded-sm hover:bg-sky-400 transition-all shadow-xl">INITIALIZE_CONSOLE</button>
                                </div>
                            )}

                            {view === 'dashboard' && (
                                <div className="max-w-5xl mx-auto space-y-6">
                                    <h2 className="text-lg font-bold mono border-b border-white/10 pb-4">ACTIVE_SIMULATIONS</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                                        {SCENARIOS.map(s => (
                                            <div key={s.id} onClick={() => startSim(s)} className="glass p-5 rounded border border-white/5 hover:border-sky-500/50 cursor-pointer transition-all group">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-[9px] mono p-1 px-2 rounded bg-sky-500/10 text-sky-400 border border-sky-500/20">{s.difficulty}</span>
                                                    {gameState.completed[s.id] && <i data-lucide="check" className="w-4 h-4 text-green-500"></i>}
                                                </div>
                                                <h3 className="text-base md:text-lg font-bold mb-1 group-hover:text-sky-400">{s.title}</h3>
                                                <p className="text-[11px] text-white/40 leading-relaxed line-clamp-3">{s.brief}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {view === 'map' && (
                                <div className="max-w-3xl mx-auto space-y-4">
                                    <h2 className="text-lg font-bold mono border-b border-white/10 pb-4">MISSION_LOG</h2>
                                    {SCENARIOS.map((s, i) => (
                                        <div key={s.id} onClick={() => startSim(s)} className="glass p-4 rounded flex items-center gap-4 md:gap-6 border border-white/5 cursor-pointer hover:bg-white/5">
                                            <span className="mono text-xl md:text-2xl font-bold text-white/10">{String(i+1).padStart(2,'0')}</span>
                                            <div className="flex-1">
                                                <h3 className="font-bold text-sm md:text-base">{s.title}</h3>
                                                <p className="text-[10px] md:text-xs text-white/30">{s.subtitle}</p>
                                            </div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-white/10"></i>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {view === 'rank' && (
                                <div className="max-w-xl mx-auto space-y-6 pt-4 text-center">
                                    <div className="glass p-8 rounded-xl border border-sky-500/20">
                                        <div className="w-20 h-20 bg-sky-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-sky-500/30">
                                            <i data-lucide="award" className="w-10 h-10 text-sky-400"></i>
                                        </div>
                                        <h3 className="text-2xl font-bold mb-1">{getRank(gameState.xp).split(' · ')[1]}</h3>
                                        <p className="text-[10px] text-white/30 mono uppercase tracking-[0.2em] mb-8">Career Status Dossier</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white/5 p-4 rounded">
                                                <p className="text-[9px] mono text-white/30 mb-1">XP_ACCUMULATED</p>
                                                <p className="text-xl font-bold">{gameState.xp}</p>
                                            </div>
                                            <div className="bg-white/5 p-4 rounded">
                                                <p className="text-[9px] mono text-white/30 mb-1">NODES_SOLVED</p>
                                                <p className="text-xl font-bold">{Object.keys(gameState.completed).length}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'playing' && currentSim && (
                                <div className="max-w-6xl mx-auto flex flex-col lg:flex-row gap-6">
                                    {/* Interaction Panel */}
                                    <div className="flex-1 flex flex-col gap-4">
                                        <div className="glass p-6 md:p-10 rounded-xl relative overflow-hidden border border-sky-500/20">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-sky-500"></div>
                                            <div className="flex justify-between items-center mb-6 mono text-[9px] text-white/30 uppercase">
                                                <span>SIGNAL_0{currentSim.id}</span>
                                                <span className="flex items-center gap-1 text-sky-400"><i data-lucide="zap" className="w-2 h-2 animate-pulse"></i> ACTIVE</span>
                                            </div>
                                            <p className="text-xl md:text-3xl font-light leading-snug crt-flicker mb-10">
                                                {currentSim.nodes[currentNode].scene}
                                            </p>

                                            {aiFeedback && (
                                                <div className="bg-sky-500/5 border border-sky-500/20 p-4 rounded-md mb-8 animate-in fade-in">
                                                    <p className="text-[9px] font-bold text-sky-400 mono mb-2">MENTOR_EVALUATION</p>
                                                    <p className="text-xs italic text-white/70 leading-relaxed">{aiFeedback}</p>
                                                </div>
                                            )}

                                            <div className="grid gap-3">
                                                {currentSim.nodes[currentNode].choices?.map((c, i) => (
                                                    <button key={i} onClick={() => handleDecision(c)} className="text-left p-4 md:p-5 bg-white/5 border border-white/10 rounded-lg hover:border-sky-500 hover:bg-sky-500/10 transition-all flex items-center gap-4 group">
                                                        <span className="w-8 h-8 flex-shrink-0 bg-sky-500/20 text-sky-400 flex items-center justify-center mono font-bold text-[10px] border border-sky-500/20 rounded">0{i+1}</span>
                                                        <span className="text-xs md:text-sm">{c.text}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Data Stream Sidebar */}
                                    <div className="w-full lg:w-80 space-y-4">
                                        <div className="glass p-5 rounded-lg border border-white/10">
                                            <h4 className="text-[9px] mono text-white/30 uppercase mb-4 tracking-widest">Decision_History</h4>
                                            <div className="space-y-3 max-h-48 lg:max-h-[500px] overflow-y-auto pr-2">
                                                {history.map((h, i) => (
                                                    <div key={i} className="text-[10px] border-l border-white/10 pl-3 py-1">
                                                        <p className="text-white/20 mb-1 mono uppercase">Step_0{i+1}</p>
                                                        <p className="text-white/50 italic leading-relaxed">"{h.choice}"</p>
                                                    </div>
                                                ))}
                                                {history.length === 0 && <p className="text-[10px] text-white/10 mono italic">No steps recorded.</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'summary' && (
                                <div className="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
                                    <div className="w-16 h-16 bg-green-500/20 border border-green-500/40 rounded-full flex items-center justify-center mb-6">
                                        <i data-lucide="check" className="w-8 h-8 text-green-500"></i>
                                    </div>
                                    <h2 className="text-3xl font-bold mb-8">MODULE_SYNCED</h2>
                                    <button onClick={() => setView('dashboard')} className="w-full md:w-auto px-10 py-3 border border-sky-500/50 text-sky-400 mono text-xs rounded hover:bg-sky-500/10 transition-all">RETURN_TO_HUB</button>
                                </div>
                            )}

                        </main>
                    </div>

                    {isGenerating && (
                        <div className="fixed inset-0 bg-ti-dark/90 backdrop-blur-sm z-[100] flex flex-col items-center justify-center text-center p-6 pointer-events-none">
                            <div className="w-10 h-10 border-2 border-sky-500/20 border-t-sky-500 rounded-full animate-spin mb-4"></div>
                            <p className="mono text-[10px] tracking-[0.3em] text-sky-500 animate-pulse">SYNTHESIZING_MENTOR_INTEL...</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
